spring:
    datasource:
        url: jdbc:oracle:thin:@localhost:1521:XE  # Ajusta host, puerto y SID según tu configuración
        driverClassName: oracle.jdbc.OracleDriver
        username: # Reemplaza con tu usuario de Oracle
        password:  # Reemplaza con tu contraseña
    flyway:
        enabled: true
        locations: classpath:db/migration
    jpa:
        database-platform: org.hibernate.dialect.OracleDialect